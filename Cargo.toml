[package]
name = "polytorus"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
sha2 = "0.9"
rust-crypto = "0.2"
bincode = "1.3"
failure = "0.1"
sled = "0.34"
serde = {version ="1.0", features =["derive"]}
log = "0.4"
env_logger = "0.7.1"
clap = "2.33"
bitcoincash-addr = "0.5.2"
merkle-cbt = "0.2.2"
fn-dsa = "0.2.0"
secp256k1 = {version="0.30.0", features = ["rand"]}
rand_core = "0.6.4"
rand = "0.8.5"
actix-web = "4"
tokio = { version = "1", features = ["full"] }
revm = "22.0.0"
primitive-types = "0.13.1"
ethers = "2.0.14"
hex = "0.4.3"
sha3 = "0.10.8"
rlp = "0.6.1"
eyre = "0.6.12"
bytes = "1.10.1"
tiny-keccak = { version = "2.0.2", features = ["keccak"] }
